name: Downgrade
on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
jobs:
  downgrade:
    # Runs strict (allow_reresolve=false); expected RED until modern Lux/AD stack resolves (test reworked in #49)
    name: "Downgrade"
    uses: "SciML/.github/.github/workflows/downgrade.yml@v1"
    with:
      julia-version: "lts"
    secrets: "inherit"
